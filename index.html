<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexis AI Frameworks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --brand-purple: #6952DB;
            --dark-navy: #19133C;
            --light-lavender: #E0DBFD;
            --deep-black: #09061A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--deep-black); color: var(--light-lavender); overflow-x: hidden; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(25, 19, 60, 0.85);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(105, 82, 219, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .logo span { color: var(--brand-purple); }

        /* Navigation */
        .nav-wrapper { display: flex; align-items: center; gap: 40px; }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { color: var(--light-lavender); text-decoration: none; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .header-controls { display: flex; align-items: center; gap: 15px; }
        .search-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(105, 82, 219, 0.3); padding: 8px 16px; border-radius: 20px; color: #fff; width: 140px; }

        /* Mobile Menu Styles */
        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 1001; }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-wrapper {
                position: fixed; top: 0; right: -100%; height: 100vh; width: 100%;
                background: var(--deep-black); flex-direction: column; justify-content: center;
                transition: 0.4s ease-in-out; gap: 40px;
            }
            .nav-wrapper.active { right: 0; }
            .nav-links { flex-direction: column; align-items: center; }
        }

        /* Hero Section */
        .hero { padding: 80px 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; min-height: 80vh; }
        .hero-content h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1; color: #fff; margin-bottom: 25px; }
        .hero-content h1 span { color: var(--brand-purple); }
        .hero-desc { font-size: 1.1rem; margin-bottom: 40px; max-width: 550px; }
        .cta-group { display: flex; gap: 15px; }
        .btn { padding: 14px 32px; border-radius: 50px; font-weight: 700; text-decoration: none; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }
        .btn-primary { background: var(--brand-purple); color: #fff; }
        .btn-secondary { border: 1px solid rgba(224, 219, 253, 0.3); color: var(--light-lavender); }
        
        .hero-visual img { width: 100%; height: auto; border-radius: 12px; }

        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; text-align: center; padding-top: 40px; }
            .cta-group { justify-content: center; }
            .hero-desc { margin-left: auto; margin-right: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXIS<span>.</span></div>
        <button class="mobile-menu-btn" id="menuToggle">☰</button>
        <div class="nav-wrapper" id="navWrapper">
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Reviews</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </nav>
            <div class="header-controls">
                <input type="text" class="search-box" placeholder="Search...">
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>AUTOMATED<br><span>ROBOTIC CORE</span></h1>
            <p class="hero-desc">Deploy and configure production-grade humanoid frameworks natively within our decentralized neural infrastructure.</p>
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Shop Now</a>
                <a href="#" class="btn btn-secondary">Contact Us</a>
            </div>
        </div>
        <div class="hero-visual">
            <img src="https://i.postimg.cc/c4GmLVXQ/craiyon-021832-image.png" alt="Nexis Systems">
        </div>
    </section>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navWrapper = document.getElementById('navWrapper');
        
        menuToggle.addEventListener('click', () => {
            navWrapper.classList.toggle('active');
            menuToggle.textContent = navWrapper.classList.contains('active') ? '✕' : '☰';
        });
    </script>
</body>
</html>
