<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexis AI Frameworks</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --brand-purple: #6952DB;
            --dark-navy: #19133C;
            --light-lavender: #E0DBFD;
            --deep-black: #09061A;
            --font-branding: 'Orbitron', sans-serif;
            --font-headings: 'Orbitron', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-body); }
        body { background-color: var(--deep-black); color: var(--light-lavender); overflow-x: hidden; line-height: 1.6; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(25, 19, 60, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(105, 82, 219, 0.2); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: var(--font-branding); font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .logo span { color: var(--brand-purple); }

        .hero { padding: 100px 8% 80px 8%; display: grid; grid-template-columns: 40% 60%; gap: 50px; align-items: center; min-height: 80vh; }
        .hero-content h1 { font-family: var(--font-headings); font-size: 4.5rem; line-height: 1.1; color: #fff; margin-bottom: 25px; }
        .hero-content h1 span { color: var(--brand-purple); }
        .hero-desc { font-size: 1.15rem; margin-bottom: 40px; color: var(--light-lavender); opacity: 0.9; max-width: 550px; }

        /* --- UPDATED BUTTON LAYOUT --- */
        .cta-group {
            display: flex;
            gap: 15px;
            flex-wrap: nowrap; /* Forces side-by-side layout */
            align-items: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap; /* Prevents button text wrapping */
        }
        .btn-primary { background: var(--brand-purple); color: #fff; border: 1px solid var(--brand-purple); }
        .btn-secondary { background: transparent; color: var(--light-lavender); border: 1px solid rgba(224, 219, 253, 0.3); }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            .cta-group { justify-content: center; }
            .hero-content { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXIS<span>.</span></div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>AUTOMATED<br><span>ROBOTIC CORE</span></h1>
            <p class="hero-desc">Deploy and configure production-grade humanoid frameworks natively within our decentralized neural infrastructure.</p>
            
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Shop Now</a>
                <a href="#" class="btn btn-secondary">Contact Us</a>
            </div>
        </div>
        <div class="hero-visual">
            <img src="https://i.postimg.cc/c4GmLVXQ/craiyon-021832-image.png" alt="Nexis Systems" style="width: 100%; max-width: 450px;">
        </div>
    </section>

</body>
</html>
