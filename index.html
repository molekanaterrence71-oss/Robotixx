<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexis AI - Mobile Optimized</title>
    <style>
        :root {
            --brand-purple: #6952DB;
            --deep-black: #09061A;
            --light-lavender: #E0DBFD;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--deep-black); color: var(--light-lavender); }

        /* Optimized Header */
        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* Hero Layout - Mobile First */
        .hero { 
            padding: 50px 5%; 
            display: flex; 
            flex-direction: column; 
            text-align: center; 
            gap: 30px; 
        }

        .hero h1 { font-size: 2.5rem; line-height: 1.1; color: #fff; }

        /* Button Optimization */
        .cta-group { 
            display: flex; 
            flex-direction: column; /* Stack buttons on mobile */
            gap: 12px; 
            width: 100%; 
            max-width: 300px; 
            margin: 0 auto; 
        }

        .btn { 
            padding: 16px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
        }

        .btn-primary { background: var(--brand-purple); color: #fff; }
        .btn-secondary { border: 1px solid var(--light-lavender); color: #fff; }

        .hero-visual img { width: 100%; max-width: 350px; height: auto; }

        /* Tablet/Desktop Override */
        @media (min-width: 768px) {
            .hero { flex-direction: row; text-align: left; padding: 100px 8%; }
            .cta-group { flex-direction: row; margin: 0; }
            .hero-visual img { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXIS.</div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>AUTOMATED<br><span style="color:var(--brand-purple)">ROBOTIC CORE</span></h1>
            <p style="margin: 20px 0;">Deploy humanoid frameworks natively within our neural infrastructure.</p>
            
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Shop Now</a>
                <a href="#" class="btn btn-secondary">Contact Us</a>
            </div>
        </div>
        
        <div class="hero-visual">
            <img src="https://i.postimg.cc/c4GmLVXQ/craiyon-021832-image.png" alt="Nexis Interface">
        </div>
    </section>

</body>
</html>
