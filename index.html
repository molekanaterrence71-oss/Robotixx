<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexis AI Frameworks</title>
    <style>
        /* --- FUTURISTIC TYPOGRAPHY CONFIGURATION --- */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            /* Assigned Palette */
            --brand-purple: #6952DB;
            --dark-navy: #19133C;
            --light-lavender: #E0DBFD;
            --deep-black: #09061A;
            
            /* Typography Maps */
            --font-branding: 'Orbitron', sans-serif;
            --font-headings: 'Orbitron', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- GLOBAL RESET & STRUCTURE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
        }

        body {
            background-color: var(--deep-black);
            color: var(--light-lavender);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- STICKY NAVIGATION BAR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(25, 19, 60, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(105, 82, 219, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-branding);
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }
        .logo span { color: var(--brand-purple); }

        .nav-wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links a {
            color: var(--light-lavender);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
            text-shadow: 0 0 8px rgba(105, 82, 219, 0.6);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(105, 82, 219, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            color: #fff;
            outline: none;
            font-size: 0.85rem;
            width: 180px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--light-lavender);
            font-size: 1.2rem;
            position: relative;
        }
        
        .badge {
            position: absolute;
            top: 0; right: 0;
            background: var(--brand-purple);
            width: 6px; height: 6px;
            border-radius: 50%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* --- TWO-COLUMN HERO SECTION --- */
        .hero {
            padding: 100px 8% 80px 8%;
            display: grid;
            grid-template-columns: 40% 60%;
            gap: 50px;
            align-items: center;
            min-height: 80vh;
        }

        .hero-content h1 {
            font-family: var(--font-headings);
            font-size: 4.5rem;
            line-height: 1.1;
            color: #fff;
            margin-bottom: 25px;
        }
        .hero-content h1 span { color: var(--brand-purple); }

        .hero-desc {
            font-size: 1.15rem;
            margin-bottom: 40px;
            color: var(--light-lavender);
            max-width: 550px;
        }

        /* Button side-by-side layout */
        .cta-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: var(--brand-purple);
            color: #fff;
            border: 1px solid var(--brand-purple);
        }
        .btn-primary:hover { background: #5544b5; }
        
        .btn-secondary {
            background: transparent;
            color: var(--light-lavender);
            border: 1px solid rgba(224, 219, 253, 0.3);
        }
        .btn-secondary:hover { background: rgba(224, 219, 253, 0.1); }

        .hero-visual img {
            width: 70%; 
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.6));
            border-radius: 12px;
        }

        /* --- RESPONSIVE / MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            .cta-group { justify-content: center; }
            .nav-wrapper { display: none; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXIS<span>.</span></div>
        <button class="mobile-menu-btn" id="menuToggle">☰</button>
        <div class="nav-wrapper" id="navWrapper">
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Reviews</a></li>
                    <li><a href="#">FAQ</a></li>
                </ul>
            </nav>
            <div class="header-controls">
                <input type="text" class="search-box" placeholder="Search...">
                <button class="icon-btn"><span class="badge"></span></button>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>AUTOMATED<br><span>ROBOTIC CORE</span></h1>
            <p class="hero-desc">Deploy and configure production-grade humanoid frameworks natively within our decentralized neural infrastructure.</p>
            
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Shop Now</a>
                <a href="#" class="btn btn-secondary">Contact Us</a>
            </div>
        </div>
        <div class="hero-visual">
            <img src="https://i.postimg.cc/c4GmLVXQ/craiyon-021832-image.png" alt="Nexis Systems">
        </div>
    </section>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navWrapper = document.getElementById('navWrapper');
        menuToggle.addEventListener('click', () => {
            navWrapper.style.display = navWrapper.style.display === 'flex' ? 'none' : 'flex';
        });
    </script>
</body>
</html>
